name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as non-blocking
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check imports
        run: |
          pip install isort
          isort . --check-only --diff

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          test -f main.py && echo "✓ main.py"
          test -f database.py && echo "✓ database.py"
          test -f requirements.txt && echo "✓ requirements.txt"
          test -d templates && echo "✓ templates/"
          test -d static && echo "✓ static/"
